<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/task_styles.css">
    <link rel="stylesheet" href="css/ai-navigator.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="img/favicon/faviconAY.ico">
    <script src="js/navbar.js" defer></script>
    <script src="js/topbar.js" defer></script>
    <script src="js/ai-navigator.js" defer></script>
    <script src="js/taskHandler.js" defer></script>
</head>

<body>
    <div id="topbar"></div>
    <div id="navbar"></div>

    <!-- AI Navigator Sidebar -->
    <div id="ai-navigator-container" data-role="User" data-user-id="" data-user-name="">
    </div>

    <main class="planner-main-horizontal">
        <h1><i class="fas fa-tasks"></i> Task Management</h1>
        <table id="taskTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Tasks will be loaded dynamically via JS -->
            </tbody>
        </table>
    </main>
</body>

</html>
