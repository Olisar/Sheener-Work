<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Repo Tree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f6f8fa;
      margin: 0;
      padding: 0;
    }
    h2 {
      text-align: center;
      margin-top: 28px;
      color: #0056b3;
    }
    pre {
      background: #222;
      color: #fff;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Fira Mono', 'Consolas', 'Courier New', monospace;
      font-size: 15px;
      max-width: 900px;
      margin: 32px auto 0 auto;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      overflow-x: auto;
    }
    @media (max-width: 600px) {
      pre { font-size: 13px; padding: 10px; }
    }
  </style>
</head>
<body>
  <h2>Repo Map</h2>
  <pre id="tree">Loading...</pre>
  <script>
    fetch('PY/repo.txt')
      .then(response => {
        if (!response.ok) throw new Error('Could not load tree file.');
        return response.text();
      })
      .then(data => {
        document.getElementById('tree').textContent = data;
      })
      .catch(err => {
        document.getElementById('tree').textContent = 'Error loading tree: ' + err.message;
      });
  </script>
</body>
</html>
