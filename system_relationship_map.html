<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="img/favicon/faviconAY.ico" />
  <title>System Relationship Map • Sheener</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Use CDNJS as approved by CSP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js?v=2" defer></script>
  <script src="js/navbar.js?v=2" defer></script>
  <script src="js/topbar.js?v=2" defer></script>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-glass: rgba(30, 41, 59, 0.7);
      --bg-controls: rgba(15, 23, 42, 0.9);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent-php: #6366f1;
      --accent-js: #f59e0b;
      --accent-css: #8b5cf6;
      --accent-backend: #10b981;
      --accent-active: #60a5fa;
      --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
      --border-radius: 12px;
      --control-size: 40px;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #container {
      width: 100vw;
      height: calc(100vh - 100px);
      /* Account for topbar/navbar */
      position: relative;
      margin-top: 100px;
    }

    /* Canvas Background */
    .graph-background {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    #graph svg {
      cursor: grab;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #graph svg:active {
      cursor: grabbing;
    }

    /* SVG Styles */
    .link {
      fill: none;
      stroke: var(--text-secondary);
      stroke-opacity: 0.6;
      stroke-width: 1.5px;
      transition: all 0.3s ease;
    }

    .link.highlighted {
      stroke: var(--accent-active);
      stroke-opacity: 1;
      stroke-width: 2px;
      filter: drop-shadow(0 0 3px rgba(96, 165, 250, 0.8));
    }

    .link.fade {
      stroke-opacity: 0.15;
    }

    .node {
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .node-circle {
      stroke-width: 2px;
      stroke: var(--bg-primary);
      filter: drop-shadow(var(--shadow-glow));
      transition: all 0.3s ease;
    }

    .node:hover .node-circle {
      stroke-width: 3px;
      filter: drop-shadow(0 0 25px currentColor);
      transform: scale(1.1);
    }

    .node-label {
      font-size: 11px;
      font-weight: 600;
      fill: var(--text-primary);
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      transition: all 0.3s ease;
    }

    .node:hover .node-label {
      font-size: 12px;
      fill: #fff;
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      padding: 12px 16px;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      font-size: 13px;
      color: var(--text-primary);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -100%);
      transition: opacity 0.2s ease;
      z-index: 1000;
      max-width: 280px;
    }

    .tooltip.show {
      opacity: 1;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--bg-glass);
    }

    /* Legend */
    .legend {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius);
      padding: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      font-size: 13px;
      z-index: 100;
    }

    .legend h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .legend-item:hover {
      opacity: 0.8;
    }

    .legend-item.inactive {
      opacity: 0.4;
    }

    .legend-symbol {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Zoom Controls */
    .zoom-controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: var(--bg-controls);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      z-index: 100;
    }

    .zoom-btn {
      width: var(--control-size);
      height: var(--control-size);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .zoom-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }

    .zoom-btn:active {
      transform: scale(0.95);
    }

    .zoom-level {
      width: var(--control-size);
      height: var(--control-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: default;
    }

    /* Loading */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-php);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .legend {
        top: 10px;
        right: 10px;
        padding: 12px;
      }

      .zoom-controls {
        bottom: 10px;
        left: 10px;
      }

      .node-label {
        font-size: 9px;
      }
    }
  </style>
</head>

<body>
  <div id="topbar"></div>
  <div id="navbar"></div>

  <div id="container">
    <div class="graph-background"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
    </div>

    <!-- Legend -->
    <div class="legend" id="legend">
      <h3>File Types</h3>
      <div class="legend-item" data-group="1">
        <div class="legend-symbol" style="background: var(--accent-php);"></div>
        <span>PHP Pages</span>
      </div>
      <div class="legend-item" data-group="2">
        <div class="legend-symbol" style="background: var(--accent-js);"></div>
        <span>JavaScript</span>
      </div>
      <div class="legend-item" data-group="3">
        <div class="legend-symbol" style="background: var(--accent-css);"></div>
        <span>CSS Styles</span>
      </div>
      <div class="legend-item" data-group="4">
        <div class="legend-symbol" style="background: var(--accent-backend);"></div>
        <span>PHP Backend</span>
      </div>
    </div>

    <!-- Zoom Controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomInBtn" title="Zoom In (+)">+</button>
      <div class="zoom-level" id="zoomLevel">100%</div>
      <button class="zoom-btn" id="zoomOutBtn" title="Zoom Out (−)">−</button>
      <button class="zoom-btn" id="fitBtn" title="Fit to Screen (0)" style="font-size: 16px;">⊡</button>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- Graph Container -->
    <div id="graph"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Enhanced Graph Data
      const graphData = {
        nodes: [
          { id: "index.php", group: 1, type: "entry", description: "Main dashboard entry point" },
          { id: "planner.js", group: 2, type: "planner", description: "Scheduling and planning logic" },
          { id: "assessment_form.php", group: 1, type: "form", description: "Assessment form interface" },
          { id: "assessment.js", group: 2, type: "assessment", description: "Assessment form handling" },
          { id: "task_list.php", group: 1, type: "list", description: "Task listing page" },
          { id: "process.php", group: 1, type: "process", description: "Process management page" },
          { id: "processmenu.js", group: 2, type: "menu", description: "Process menu interactions" },
          { id: "panel.js", group: 2, type: "panel", description: "Panel management" },
          { id: "styles.css", group: 3, type: "style", description: "Main stylesheet" },
          { id: "panel.css", group: 3, type: "style", description: "Panel-specific styles" },
          { id: "php/taskfetch.php", group: 4, type: "api", description: "Task data API" },
          { id: "php/update_task.php", group: 4, type: "api", description: "Task update endpoint" },
          { id: "php/get_all_tasks.php", group: 4, type: "api", description: "All tasks fetcher" },
          { id: "php/get_assessment.php", group: 4, type: "api", description: "Assessment data API" },
          { id: "php/add_assessment.php", group: 4, type: "api", description: "Add assessment endpoint" },
          { id: "php/delete_assessment.php", group: 4, type: "api", description: "Delete assessment endpoint" },
          { id: "php/people_list.php", group: 4, type: "api", description: "People data API" }
        ],
        links: [
          { source: "index.php", target: "planner.js", strength: 0.8 },
          { source: "planner.js", target: "styles.css", strength: 0.3 },
          { source: "index.php", target: "assessment_form.php", strength: 0.9 },
          { source: "assessment_form.php", target: "assessment.js", strength: 0.9 },
          { source: "assessment.js", target: "php/get_all_tasks.php", strength: 0.7 },
          { source: "assessment.js", target: "php/get_assessment.php", strength: 0.8 },
          { source: "assessment.js", target: "php/add_assessment.php", strength: 0.6 },
          { source: "assessment.js", target: "php/delete_assessment.php", strength: 0.5 },
          { source: "index.php", target: "task_list.php", strength: 0.7 },
          { source: "task_list.php", target: "styles.css", strength: 0.3 },
          { source: "index.php", target: "process.php", strength: 0.8 },
          { source: "process.php", target: "processmenu.js", strength: 0.9 },
          { source: "processmenu.js", target: "php/people_list.php", strength: 0.6 },
          { source: "processmenu.js", target: "styles.css", strength: 0.3 },
          { source: "index.php", target: "panel.js", strength: 0.7 },
          { source: "panel.js", target: "panel.css", strength: 0.9 }
        ]
      };

      // Configuration
      const config = {
        width: window.innerWidth,
        height: window.innerHeight,
        colors: {
          1: 'var(--accent-php)',
          2: 'var(--accent-js)',
          3: 'var(--accent-css)',
          4: 'var(--accent-backend)'
        },
        icons: {
          1: '📄', 2: '⚡', 3: '🎨', 4: '🔧'
        }
      };

      // Initialize SVG
      const svg = d3.select("#graph")
        .append("svg")
        .attr("width", config.width)
        .attr("height", config.height);

      // Main group for zoom/pan
      const g = svg.append("g");

      // Zoom behavior
      let currentZoom = 1;
      const zoom = d3.zoom()
        .scaleExtent([0.2, 6])
        .on("zoom", (event) => {
          currentZoom = event.transform.k;
          updateZoomLevel();
          g.attr("transform", event.transform);
        });

      svg.call(zoom);

      // Force simulation
      const simulation = d3.forceSimulation(graphData.nodes)
        .force("link", d3.forceLink(graphData.links)
          .id(d => d.id)
          .distance(d => 100 - (d.strength * 30))
          .strength(d => d.strength || 0.5)
        )
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(config.width / 2, config.height / 2))
        .force("collision", d3.forceCollide().radius(30))
        .force("x", d3.forceX(d => {
          const xMap = { 1: -150, 2: -50, 3: 50, 4: 150 };
          return config.width / 2 + (xMap[d.group] || 0);
        }).strength(0.1))
        .force("y", d3.forceY(config.height / 2).strength(0.05));

      // Run simulation to stable state without animation
      for (let i = 0; i < 300; ++i) simulation.tick();
      simulation.stop(); // Stop simulation to prevent further updates

      // Arrow markers
      const defs = g.append("defs");
      defs.selectAll("marker")
        .data([1, 2, 3, 4])
        .enter().append("marker")
        .attr("id", d => `arrow-${d}`)
        .attr("viewBox", "0 -5 10 10")
        .attr("refX", 25)
        .attr("refY", 0)
        .attr("markerWidth", 6)
        .attr("markerHeight", 6)
        .attr("orient", "auto")
        .append("path")
        .attr("d", "M0,-5L10,0L0,5")
        .attr("fill", config.colors[2]);

      // Draw links
      const link = g.append("g")
        .selectAll("path")
        .data(graphData.links)
        .enter().append("path")
        .attr("class", "link")
        .attr("marker-end", "url(#arrow-2)");

      // Draw nodes
      const node = g.append("g")
        .selectAll("g")
        .data(graphData.nodes)
        .enter().append("g")
        .attr("class", "node");

      // Add circles, icons, labels
      node.append("circle")
        .attr("class", "node-circle")
        .attr("r", d => Math.max(8, Math.min(15, 8 + (graphData.links.filter(l =>
          l.source.id === d.id || l.target.id === d.id).length * 2))))
        .attr("fill", d => config.colors[d.group])
        .attr("color", d => config.colors[d.group]);

      node.append("text")
        .attr("class", "node-icon")
        .attr("text-anchor", "middle")
        .attr("dy", ".35em")
        .attr("font-size", "14px")
        .text(d => config.icons[d.group]);

      node.append("text")
        .attr("class", "node-label")
        .attr("dy", 25)
        .text(d => d.id.split('/').pop());

      // Tooltip
      const tooltip = d3.select("#tooltip");

      // Node hover interactions
      node
        .on("mouseenter", function (event, d) {
          const connections = graphData.links.filter(l =>
            l.source.id === d.id || l.target.id === d.id);
          tooltip.html(`
          <strong>${d.id}</strong><br/>
          <span style="color: ${config.colors[d.group]}">● ${getGroupName(d.group)}</span><br/>
          <small>${d.description}</small><br/>
          <hr style="margin: 8px 0; border: 1px solid rgba(255,255,255,0.1)">
          Connections: ${connections.length}
        `)
            .style("left", (event.pageX) + "px")
            .style("top", (event.pageY - 10) + "px")
            .classed("show", true);

          link.classed("highlighted", l => l.source.id === d.id || l.target.id === d.id)
            .classed("fade", l => !(l.source.id === d.id || l.target.id === d.id));

          node.style("opacity", n => {
            const isConnected = n.id === d.id ||
              connections.some(l => l.source.id === n.id || l.target.id === n.id);
            return isConnected ? 1 : 0.3;
          });
        })
        .on("mouseleave", function () {
          tooltip.classed("show", false);
          link.classed("highlighted", false).classed("fade", false);
          node.style("opacity", 1);
        })
        .on("click", function (event, d) {
          // Zoom to node with animation
          const scale = 2;
          const transform = d3.zoomIdentity
            .translate(config.width / 2 - d.x * scale, config.height / 2 - d.y * scale)
            .scale(scale);
          svg.transition().duration(750).call(zoom.transform, transform);
        });

      // Legend interactions
      const legendItems = d3.selectAll(".legend-item");
      const activeGroups = new Set([1, 2, 3, 4]);

      legendItems.on("click", function () {
        const group = +this.dataset.group;
        if (activeGroups.has(group)) {
          activeGroups.delete(group);
          this.classList.add("inactive");
        } else {
          activeGroups.add(group);
          this.classList.remove("inactive");
        }
        updateVisibility();
      });

      function updateVisibility() {
        node.style("display", d => activeGroups.has(d.group) ? "block" : "none");
        link.style("display", l =>
          activeGroups.has(l.source.group) && activeGroups.has(l.target.group) ? "block" : "none");
      }

      // Zoom control functions
      function updateZoomLevel() {
        const percent = Math.round(currentZoom * 100);
        document.getElementById('zoomLevel').textContent = `${percent}%`;
      }

      function zoomIn() {
        svg.transition().duration(300).call(zoom.scaleBy, 1.3);
      }

      function zoomOut() {
        svg.transition().duration(300).call(zoom.scaleBy, 0.7);
      }

      function fitToScreen() {
        const bounds = g.node().getBBox();
        const fullWidth = config.width;
        const fullHeight = config.height;
        const width = bounds.width;
        const height = bounds.height;
        const midX = bounds.x + width / 2;
        const midY = bounds.y + height / 2;

        if (width === 0 || height === 0) return;

        const scale = Math.min(fullWidth / width, fullHeight / height) * 0.8;
        const translate = [fullWidth / 2 - scale * midX, fullHeight / 2 - scale * midY];

        svg.transition().duration(750).call(
          zoom.transform,
          d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
        );
      }

      function resetZoom() {
        svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
      }

      // Control buttons
      document.getElementById("zoomInBtn").addEventListener("click", zoomIn);
      document.getElementById("zoomOutBtn").addEventListener("click", zoomOut);
      document.getElementById("fitBtn").addEventListener("click", fitToScreen);

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (e.target.tagName === 'INPUT') return;

        switch (e.key) {
          case '+':
          case '=':
            zoomIn();
            break;
          case '-':
          case '_':
            zoomOut();
            break;
          case '0':
            fitToScreen();
            break;
          case 'r':
          case 'R':
            resetZoom();
            break;
          case 'f':
          case 'F':
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen();
            } else {
              document.exitFullscreen();
            }
            break;
        }
      });

      // Set final positions after simulation completes
      link.attr("d", d => {
        const dx = d.target.x - d.source.x;
        const dy = d.target.y - d.source.y;
        const dr = Math.sqrt(dx * dx + dy * dy) * 0.3;
        return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
      });

      node.attr("transform", d => `translate(${d.x},${d.y})`);

      // Helper functions
      function getGroupName(group) {
        const names = { 1: 'PHP Page', 2: 'JavaScript', 3: 'CSS', 4: 'PHP Backend' };
        return names[group] || 'Unknown';
      }

      // Hide loading and fit to screen
      document.getElementById("loading").classList.add("hidden");
      setTimeout(fitToScreen, 100);

      // Handle resize
      window.addEventListener("resize", () => {
        config.width = window.innerWidth;
        config.height = window.innerHeight;
        svg.attr("width", config.width).attr("height", config.height);
        simulation.force("center", d3.forceCenter(config.width / 2, config.height / 2));
      });

      // Initialize zoom level display
      updateZoomLevel();
    });
  </script>
</body>

</html>
