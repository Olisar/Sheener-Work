<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            color: #0056b3;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .status-box {
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .status-box.valid {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        
        .status-box.invalid {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        
        .status-box.expired {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
        }
        
        .status-box.loading {
            background: #e7f3ff;
            border: 2px solid #0056b3;
            color: #003d82;
        }
        
        .status-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .info-grid {
            text-align: left;
            margin-top: 1rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #333;
        }
        
        .info-value {
            color: #666;
            text-align: right;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 86, 179, 0.3);
            border-top-color: #0056b3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        button {
            margin-top: 1.5rem;
            padding: 0.875rem 1.5rem;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        button:hover {
            background: #003d82;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.3);
        }
        
        .manual-check {
            margin-top: 2rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .manual-check strong {
            color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔍</div>
        <h1>Certificate Verification</h1>
        <p class="subtitle">Safety Induction Certificate Validator</p>
        
        <div id="statusArea" class="status-box loading">
            <div class="spinner"></div>
            <p>Verifying certificate...</p>
        </div>
        
        <button onclick="location.reload()" style="display: none;" id="retryBtn">
            🔄 Verify Again
        </button>
    </div>
    
    <script>
        // Get QR value from URL
        const urlParams = new URLSearchParams(window.location.search);
        const qrValue = urlParams.get('qr');
        
        async function verifyCertificate() {
            const statusArea = document.getElementById('statusArea');
            const retryBtn = document.getElementById('retryBtn');
            
            if (!qrValue) {
                statusArea.className = 'status-box invalid';
                statusArea.innerHTML = `
                    <div class="status-title">❌ Invalid Request</div>
                    <p>No certificate code provided for verification.</p>
                `;
                retryBtn.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`php/verify_certificate.php?qr=${encodeURIComponent(qrValue)}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                if (data.valid && !data.expired) {
                    // VALID CERTIFICATE
                    statusArea.className = 'status-box valid';
                    statusArea.innerHTML = `
                        <div class="status-title">✅ Valid Certificate</div>
                        <p style="margin-bottom: 1rem;">This certificate is authentic and currently valid.</p>
                        <div class="info-grid">
                            <div class="info-row">
                                <span class="info-label">Holder:</span>
                                <span class="info-value">${data.name || 'Visitor'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Certificate ID:</span>
                                <span class="info-value">${data.cert_id || qrValue}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Issued:</span>
                                <span class="info-value">${formatDate(data.issue_date)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Expires:</span>
                                <span class="info-value">${formatDate(data.expiry_date)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Quiz Score:</span>
                                <span class="info-value">${data.score}/${data.total} (${data.percentage}%)</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Days Remaining:</span>
                                <span class="info-value">${data.days_remaining} days</span>
                            </div>
                        </div>
                    `;
                } else if (data.expired) {
                    // EXPIRED CERTIFICATE
                    statusArea.className = 'status-box expired';
                    statusArea.innerHTML = `
                        <div class="status-title">⚠️ Certificate Expired</div>
                        <p style="margin-bottom: 1rem;">This certificate has expired and is no longer valid.</p>
                        <div class="info-grid">
                            <div class="info-row">
                                <span class="info-label">Holder:</span>
                                <span class="info-value">${data.name || 'Visitor'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Expired On:</span>
                                <span class="info-value">${formatDate(data.expiry_date)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Days Overdue:</span>
                                <span class="info-value">${Math.abs(data.days_remaining)} days</span>
                            </div>
                        </div>
                        <p style="margin-top: 1rem; font-size: 0.9rem;">
                            <strong>Action Required:</strong> Visitor must retake the safety induction.
                        </p>
                    `;
                } else {
                    // INVALID CERTIFICATE
                    statusArea.className = 'status-box invalid';
                    statusArea.innerHTML = `
                        <div class="status-title">❌ Invalid Certificate</div>
                        <p>This certificate could not be verified in our system.</p>
                        <p style="margin-top: 1rem; font-size: 0.9rem;">
                            Certificate code: <code>${qrValue}</code>
                        </p>
                    `;
                }
                
                retryBtn.style.display = 'block';
                
            } catch (error) {
                console.error('Verification error:', error);
                statusArea.className = 'status-box invalid';
                statusArea.innerHTML = `
                    <div class="status-title">❌ Verification Failed</div>
                    <p>Unable to verify certificate: ${error.message}</p>
                    <div class="manual-check">
                        <strong>Manual Verification:</strong><br>
                        Certificate Code: <code>${qrValue}</code><br>
                        Please contact the safety office for manual verification.
                    </div>
                `;
                retryBtn.style.display = 'block';
            }
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }
        
        // Start verification on page load
        window.addEventListener('DOMContentLoaded', verifyCertificate);
    </script>
</body>
</html>
