<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Control Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      form {
        max-width: 800px;
        margin: auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f9f9f9;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      label {
        font-weight: bold;
        display: block;
      }
      input,
      textarea,
      select {
        width: calc(100% - 10px);
        padding: 6px;
        margin: 2px 0 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      input[type="date"] {
        width: 50%;
      }
      select {
        width: 100%;
      }
      button {
        background-color: #007bff;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }
      .action-plan {
        margin-top: 20px;
      }
      .task {
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        background-color: #fff;
      }
      .subtask {
        margin-left: 20px;
        border-left: 2px solid #ccc;
        padding-left: 10px;
      }
    </style>
    <script src="js/taskHandler.js"></script>
    <!-- Load JavaScript -->
    <script src="js/changeControl.js"></script>
    <!-- Load JavaScript -->
  </head>
  <body>
    <form id="changeControlForm">
      <h2>Change Control Form</h2>

      <label for="targetDate">Target Date of Closure:</label>
      <input type="date" id="targetDate" name="targetDate" />

      <label for="impactedSites">Impacted Sites:</label>
      <input type="text" id="impactedSites" name="impactedSites" />

      <label for="market">Market:</label>
      <input type="text" id="market" name="market" />

      <label for="title">Title:</label>
      <input type="text" id="title" name="title" />

      <label for="changeFrom">Change From:</label>
      <textarea id="changeFrom" name="changeFrom" rows="3"></textarea>

      <label for="changeTo">Change To:</label>
      <textarea id="changeTo" name="changeTo" rows="3"></textarea>

      <label for="changeType">Change Type:</label>
      <select id="changeType" name="changeType">
        <option value="major">Major</option>
        <option value="minor">Minor</option>
      </select>

      <label for="justification">Justification of Change:</label>
      <textarea id="justification" name="justification" rows="2"></textarea>

      <h3>Action Plan</h3>
      <div id="taskList" class="action-plan"></div>
      <button type="button" onclick="addTask()">Add Task</button>

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
